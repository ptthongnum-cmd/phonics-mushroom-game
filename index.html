<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Phonics Mushroom Tap Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #ffebf0; overflow: hidden; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>

<script>
// --- การตั้งค่าระบบเกม ---
const config = {
    type: Phaser.AUTO,
    width: 800,
    height: 600,
    parent: 'game-container',
    physics: {
        default: 'arcade',
        arcade: { gravity: { y: 0 }, debug: false } // ปิดแรงโน้มถ่วง เพราะเราจะเน้นเอานิ้วจิ้มเห็ดที่ลอยอยู่
    },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let score = 0;
let scoreText;
let targetText;
let currentTarget = 'it'; // เกมจะสุ่มเสียงที่ต้องหา (-it หรือ -ig)
let spawnTimer;

// คลังคำศัพท์ Phonics สำเร็จรูปสำหรับแปะบนหัวเห็ด
const wordsIT = ['sit', 'hit', 'fit', 'bit', 'pit'];
const wordsIG = ['pig', 'dig', 'big', 'wig', 'fig'];

function preload() {
    // โหลดกราฟิกธีมมาริโอ้ สีสันสดใสพาสเทล
    this.load.image('sky', 'https://labs.phaser.io/assets/skies/gradient24.png'); // ท้องฟ้าสดใส
    this.load.image('brick', 'https://labs.phaser.io/assets/sprites/platform.png'); // บล็อกดิน/อิฐมาริโอ้
    this.load.image('mushroom_it', 'https://labs.phaser.io/assets/sprites/mushroom.png'); // เห็ดแดง -it
    this.load.image('mushroom_ig', 'https://labs.phaser.io/assets/sprites/apple.png');    // เห็ดเขียว (แอปเปิ้ลแทนชั่วคราว) -ig
}

function create() {
    // 1. ใส่ภาพพื้นหลังท้องฟ้าสไตล์มาริโอ้คิวท์ๆ
    let bg = this.add.image(400, 300, 'sky');
    bg.setDisplaySize(800, 600);

    // 2. ตกแต่งด่านด้านล่างด้วยบล็อกอิฐสไตล์มาริโอ้ (ให้ฟีลเหมือนอยู่ในเกม)
    let bricks = this.add.tileSprite(400, 560, 800, 80, 'brick');

    // 3. ตั้งค่าระบบคะแนนและป้ายคำสั่ง (ใช้ฟอนต์ไอติมทั้งหมด)
    scoreText = this.add.text(30, 30, 'คะแนน: 0', { 
        fontFamily: 'Itim', fontSize: '36px', fill: '#fff', stroke: '#ff4a85', strokeThickness: 6 
    });

    targetText = this.add.text(400, 50, 'ไหนลองจิ้มคำเสียง: -it สิคราบบบ 🍄', { 
        fontFamily: 'Itim', fontSize: '40px', fill: '#ffff00', stroke: '#000', strokeThickness: 6 
    }).setOrigin(0.5);

    // สุ่มเสียงเป้าหมายครั้งแรกเมื่อเริ่มเกม
    changeTargetSound();

    // 4. ระบบสุ่มปล่อยเห็ดเด้งขึ้นมาจากบล็อกอิฐด้านล่าง ทุกๆ 1.5 วินาที
    spawnTimer = this.time.addEvent({
        delay: 1500,
        callback: spawnMushroom,
        callbackScope: this,
        loop: true
    });
}

function update() {
    // สำหรับเกมจิ้ม เราไม่จำเป็นต้องเขียนโค้ดอัปเดตปุ่มกดแล้วครับ ตัวเกมจะรอฟังสัญญาณจากการทัชอย่างเดียวเลย
}

// --- ฟังก์ชันสุ่มปล่อยเห็ดขึ้นมาบนหน้าจอ ---
function spawnMushroom() {
    let x = Phaser.Math.Between(100, 700); // สุ่มตำแหน่งแกน X บนหน้าจอ iPad
    let y = 600; // เริ่มต้นจากด้านล่างจอ

    // สุ่มว่าเห็ดต้นนี้จะเป็นกลุ่มคำประเภทไหน (-it หรือ -ig)
    let type = Phaser.Math.Between(0, 1) === 0 ? 'it' : 'ig';
    let texture = type === 'it' ? 'mushroom_it' : 'mushroom_ig';
    let word = type === 'it' ? Phaser.Utils.Array.GetRandom(wordsIT) : Phaser.Utils.Array.GetRandom(wordsIG);

    // สร้างตัวเห็ด
    let mushroom = this.physics.add.image(x, y, texture);
    mushroom.setData('phonics_type', type);
    mushroom.setScale(1.2); // ขยายตัวเห็ดใหญ่ขึ้นอีกนิด เด็กๆ จะได้เอานิ้วแปะง่ายๆ

    // สั่งให้เห็ด "กระโดดเด้งลอยขึ้นมาจากด้านล่าง" เหมือนเห็ดมาริโอ้ที่หลุดจากบล็อก
    mushroom.setVelocityY(Phaser.Math.Between(-350, -500));

    // ใส่ตัวหนังสือคำศัพท์ "ฟอนต์ไอติม" มนๆ น่ารักๆ ไว้ที่ตัวเห็ด
    let textObj = this.add.text(x, y, word, {
        fontFamily: 'Itim',
        fontSize: '28px',
        fill: '#ffffff',
        stroke: '#000000',
        strokeThickness: 5
    }).setOrigin(0.5);

    // ตั้งค่าระบบทัชสกรีน (ใช้นิ้วแปะที่ตัวเห็ดโดยตรง)
    mushroom.setInteractive();
    
    // เมื่อเด็กรวมถึงใช้นิ้ว "แปะ/ทัช" บนหน้าจอ iPad ที่เห็ดต้นนี้
    mushroom.on('pointerdown', function() {
        // ดึงค่าประเภทของเห็ดต้นนี้มาเช็ค
        if (mushroom.getData('phonics_type') === currentTarget) {
            // หากจิ้มถูกกลุ่มเสียง -> ได้คะแนนเพิ่ม!
            score += 10;
            scoreText.setText('คะแนน: ' + score);
            
            // แสดงข้อความชมเชย
            let eff = this.scene.add.text(mushroom.x, mushroom.y, 'เย้! ถูกต้อง 🎉', { 
                fontFamily: 'Itim', fontSize: '32px', fill: '#00ff00', stroke: '#fff', strokeThickness: 5 
            }).setOrigin(0.5);
            this.scene.time.delayedCall(600, () => { eff.destroy(); });

            // เมื่อตอบถูก ให้สลับไปสุ่มหาเสียงตัวอื่นต่อทันทีเพื่อความสนุก
            changeTargetSound();
        } else {
            // หากจิ้มผิดกลุ่มเสียง -> หักคะแนนเล็กน้อย
            score -= 5;
            if (score < 0) score = 0;
            scoreText.setText('คะแนน: ' + score);

            let eff = this.scene.add.text(mushroom.x, mushroom.y, 'ลองใหม่นะ ❌', { 
                fontFamily: 'Itim', fontSize: '32px', fill: '#ff0000', stroke: '#fff', strokeThickness: 5 
            }).setOrigin(0.5);
            this.scene.time.delayedCall(600, () => { eff.destroy(); });
        }

        // จิ้มเสร็จแล้วให้ลบเห็ดและตัวหนังสือคำศัพท์ทิ้งไป
        textObj.destroy();
        mushroom.destroy();
    });

    // อัปเดตให้ข้อความวิ่งลอยตามเห็ดขึ้นไปในอากาศ
    this.tweens.add({
        targets: textObj,
        x: x,
        y: -100, // วิ่งเลยหายไปด้านบนจอ
        duration: 4000,
        onUpdate: function() {
            if (mushroom.active) {
                textObj.setPosition(mushroom.x, mushroom.y - 5);
            }
        },
        onComplete: function() {
            // ถ้าหลุดขอบจอไปโดยไม่มีใครจิ้ม ให้เคลียร์ทิ้งป้องกันเครื่องค้าง
            if (mushroom) mushroom.destroy();
            textObj.destroy();
        }
    });

    // สั่งให้ตัวเห็ดค่อยๆ ลอยเคลื่อนที่ขึ้นไปด้านบนด้วย
    this.tweens.add({
        targets: mushroom,
        y: -100,
        duration: 4000
    });
}

// ฟังก์ชันสำหรับสุ่มเปลี่ยนเสียงโจทย์ภาษาอังกฤษรอบใหม่
function changeTargetSound() {
    currentTarget = Phaser.Math.Between(0, 1) === 0 ? 'it' : 'ig';
    targetText.setText('ไหนลองจิ้มคำเสียง: -' + currentTarget + ' สิคราบบบ 🍄✨');
}
</script>

</body>
</html>
