<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Phonics Mushroom Arcade</title>
    <!-- 1. ดึงฟอนต์ "FC Itim" (ฟอนต์ไอติม) น่ารักๆ มาใช้ในเกม -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">
    
    <!-- นำเข้า Phaser 3 Library สำหรับรันเกม -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #ffebf0; overflow: hidden; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>

<script>
// --- การตั้งค่าระบบเกม ---
const config = {
    type: Phaser.AUTO,
    width: 800,
    height: 600,
    parent: 'game-container',
    physics: {
        default: 'arcade',
        arcade: { gravity: { y: 700 }, debug: false } // แรงโน้มถ่วงสไตล์มาริโอ้
    },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let player;
let mushrooms;
let score = 0;
let scoreText;
let targetText;
let currentTarget = 'it'; // เกมจะสุ่มให้เก็บเสียงใดเสียงหนึ่ง

// คลังคำศัพท์สำหรับแสดงบนหัวเห็ด
const wordsIT = ['sit', 'hit', 'fit', 'bit', 'pit'];
const wordsIG = ['pig', 'dig', 'big', 'wig', 'fig'];

function preload() {
    // โหลดภาพกราฟิกสีสันสดใสดึงดูดเด็กๆ (ใช้ Asset ออนไลน์ฟรี)
    this.load.image('sky', 'https://labs.phaser.io/assets/skies/gradient24.png'); // ท้องฟ้าทไวไลท์พาสเทล
    this.load.image('ground', 'https://labs.phaser.io/assets/sprites/platform.png');
    this.load.image('mushroom_it', 'https://labs.phaser.io/assets/sprites/mushroom.png'); // แทนเห็ด -it
    this.load.image('mushroom_ig', 'https://labs.phaser.io/assets/sprites/apple.png');    // แทนเห็ด -ig
    this.load.spritesheet('dude', 'https://labs.phaser.io/assets/sprites/dude.png', { frameWidth: 32, frameHeight: 48 });
}

function create() {
    let self = this;
    
    // ใส่พื้นหลังท้องฟ้าพาสเทล
    let bg = this.add.image(400, 300, 'sky');
    bg.setDisplaySize(800, 600);

    // สร้างพื้นดินและชั้นลอยสไตล์มาริโอ้
    let platforms = this.physics.add.staticGroup();
    platforms.create(400, 568, 'ground').setScale(2).refreshBody(); 
    platforms.create(600, 400, 'ground'); 
    platforms.create(150, 250, 'ground'); 
    platforms.create(400, 120, 'ground').setScale(0.5, 1).refreshBody();

    // สร้างตัวละครหลัก
    player = this.physics.add.sprite(100, 450, 'dude');
    player.setBounce(0.15);
    player.setCollideWorldBounds(true);

    // อนิเมชั่นการเดิน
    this.anims.create({ key: 'left', frames: this.anims.generateFrameNumbers('dude', { start: 0, end: 3 }), frameRate: 10, repeat: -1 });
    this.anims.create({ key: 'turn', frames: [ { key: 'dude', frame: 4 } ], frameRate: 20 });
    this.anims.create({ key: 'right', frames: this.anims.generateFrameNumbers('dude', { start: 5, end: 8 }), frameRate: 10, repeat: -1 });

    this.physics.add.collider(player, platforms);

    // สร้างกลุ่มเห็ด Phonics
    mushrooms = this.physics.add.group();
    
    // สุ่มปล่อยเห็ดลงมาในด่าน
    for (let i = 0; i < 3; i++) {
        // เห็ดกลุ่ม -it
        let m_it = mushrooms.create(120 + (i * 240), Phaser.Math.Between(0, 100), 'mushroom_it');
        m_it.setData('phonics_type', 'it');
        let wordIT = Phaser.Utils.Array.GetRandom(wordsIT);
        m_it.setData('word', wordIT);
        
        // เห็ดกลุ่ม -ig
        let m_ig = mushrooms.create(240 + (i * 240), Phaser.Math.Between(0, 100), 'mushroom_ig');
        m_ig.setData('phonics_type', 'ig');
        let wordIG = Phaser.Utils.Array.GetRandom(wordsIG);
        m_ig.setData('word', wordIG);
    }

    // วนลูปเพื่อสร้างตัวหนังสือ "ฟอนต์ไอติม" แปะบนหัวเห็ดทุกต้น
    mushrooms.children.iterate(function (child) {
        child.setBounceY(Phaser.Math.FloatBetween(0.2, 0.4));
        
        // ใช้ fontFFF: 'Itim' ที่ดึงมาจาก Google Fonts
        let t = self.add.text(child.x, child.y - 30, child.getData('word'), { 
            fontFamily: 'Itim', 
            fontSize: '26px', 
            fill: '#ffffff',
            stroke: '#000000',
            strokeThickness: 4
        }).setOrigin(0.5);
        
        child.setData('associated_text', t);
    });

    this.physics.add.collider(mushrooms, platforms);
    this.physics.add.overlap(player, mushrooms, collectMushroom, null, this);

    // สุ่มเสียงเป้าหมายรอบแรก (เช่น ให้เด็กๆ ตามหาเสียง -it หรือ -ig ก่อน)
    currentTarget = Phaser.Math.Between(0, 1) === 0 ? 'it' : 'ig';

    // UI แสดงคะแนนด้วยฟอนต์ไอติมสุดน่ารัก
    scoreText = this.add.text(16, 16, 'คะแนน: 0', { 
        fontFamily: 'Itim', fontSize: '32px', fill: '#fff', stroke: '#ff4a85', strokeThickness: 5 
    });

    // ป้ายบอกนักเรียนว่าตอนนี้ต้องเก็บเห็ดสระอะไร
    targetText = this.add.text(400, 25, 'ตามหาเสียง: -' + currentTarget + ' ✨', { 
        fontFamily: 'Itim', fontSize: '38px', fill: '#ffff00', stroke: '#000000', strokeThickness: 6 
    }).setOrigin(0.5);

    // สร้างปุ่ม Touch ขนาดใหญ่สำหรับ iPad ลายมินิมอลสีพาสเทล
    createTouchButtons(this);
}

let isLeftPressed = false;
let isRightPressed = false;
let isJumpPressed = false;

function update() {
    // บังคับตัวละครเดินตามการทัช
    if (isLeftPressed) {
        player.setVelocityX(-200);
        player.anims.play('left', true);
    } else if (isRightPressed) {
        player.setVelocityX(200);
        player.anims.play('right', true);
    } else {
        player.setVelocityX(0);
        player.anims.play('turn');
    }

    if (isJumpPressed && player.body.touching.down) {
        player.setVelocityY(-500);
        isJumpPressed = false; 
    }

    // อัปเดตตำแหน่งตัวหนังสือคำศัพท์ให้วิ่งตามเห็ดดึ๋งๆ
    mushrooms.children.iterate(function (child) {
        if (child.active) {
            let t = child.getData('associated_text');
            if (t) { t.setPosition(child.x, child.y - 35); }
        }
    });
}

// ฟังก์ชันเมื่อชนเห็ด (เก็บเห็ด)
function collectMushroom(player, mushroom) {
    let type = mushroom.getData('phonics_type');
    let textObj = mushroom.getData('associated_text');
    
    if (textObj) { textObj.destroy(); }
    mushroom.disableBody(true, true);

    // ระบบเช็คเงื่อนไข Phonics
    if (type === currentTarget) {
        score += 10;
        scoreText.setText('คะแนน: ' + score);
        
        // ส่องเอฟเฟกต์ตัวหนังสือชมเชยแบบน่ารัก
        let eff = this.add.text(mushroom.x, mushroom.y - 20, 'Correct! 🎉', { 
            fontFamily: 'Itim', fontSize: '30px', fill: '#00ff00', stroke: '#fff', strokeThickness: 4 
        }).setOrigin(0.5);
        this.time.delayedCall(800, () => { eff.destroy(); });
        
        // สุ่มเปลี่ยนเสียงเป้าหมายใหม่ เพิ่มความท้าทาย
        currentTarget = currentTarget === 'it' ? 'ig' : 'it';
        targetText.setText('ตามหาเสียง: -' + currentTarget + ' ✨');
    } else {
        // หากเก็บผิดสระ คะแนนลดและแจ้งเตือนคิวท์ๆ
        score -= 5;
        if(score < 0) score = 0;
        scoreText.setText('คะแนน: ' + score);
        
        let eff = this.add.text(mushroom.x, mushroom.y - 20, 'Oops! ❌', { 
            fontFamily: 'Itim', fontSize: '30px', fill: '#ff0000', stroke: '#fff', strokeThickness: 4 
        }).setOrigin(0.5);
        this.time.delayedCall(800, () => { eff.destroy(); });
    }
}

// ปุ่มกดบนหน้าจอ iPad ดีไซน์วงกลมพาสเทลน่ารัก
function createTouchButtons(scene) {
    // ปุ่มซ้าย
    let btnLeft = scene.add.circle(80, 500, 45, 0xff94b7, 0.8).setInteractive();
    scene.add.text(80, 500, '◀', { fontSize: '40px', fill: '#fff' }).setOrigin(0.5);
    btnLeft.on('pointerdown', () => { isLeftPressed = true; });
    btnLeft.on('pointerup', () => { isLeftPressed = false; });
    btnLeft.on('pointerout', () => { isLeftPressed = false; });

    // ปุ่มขวา
    let btnRight = scene.add.circle(200, 500, 45, 0xff94b7, 0.8).setInteractive();
    scene.add.text(200, 500, '▶', { fontSize: '40px', fill: '#fff' }).setOrigin(0.5);
    btnRight.on('pointerdown', () => { isRightPressed = true; });
    btnRight.on('pointerup', () => { isRightPressed = false; });
    btnRight.on('pointerout', () => { isRightPressed = false; });

    // ปุ่มกระโดด (อยู่ฝั่งขวาของหน้าจอ)
    let btnJump = scene.add.circle(700, 500, 50, 0x5ce1e6, 0.8).setInteractive();
    scene.add.text(700, 500, 'JUMP', { fontFamily: 'Itim', fontSize: '24px', fill: '#fff' }).setOrigin(0.5);
    btnJump.on('pointerdown', () => { isJumpPressed = true; });
}
</script>

</body>
</html>
